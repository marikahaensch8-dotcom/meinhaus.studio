<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mein haus — creative studio</title>
    <meta name="description" content="mein haus is a creative studio for founders and changemakers. Branding and web design that feels like home.">
    <style>
        @font-face {
            font-family: 'ABC Diatype';
            src: url('fonts/Diatype-Light.woff2') format('woff2');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'ABC Diatype';
            src: url('fonts/Diatype-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'ABC Diatype';
            src: url('fonts/Diatype-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f9f7f4;
            --text: #2d2d2d;
            --muted: #777;
            --border: #e0e0e0;
            --font: 'ABC Diatype', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.4s forwards;
        }

        .email {
            display: inline-block;
            font-size: clamp(1rem, 2vw, 1.125rem);
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
            padding-bottom: 0.25rem;
            border-bottom: 1.5px solid var(--border);
            transition: border-color 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.6s forwards;
        }

        .email:hover {
            border-bottom-color: var(--text);
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.8125rem;
            color: var(--muted);
            opacity: 0;
            animation: fadeIn 0.8s ease 1s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        ::selection {
            background: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title" id="title">We're building<br>something nice.</h1>

        <a href="mailto:hello@meinhaus.studio" class="email">hello@meinhaus.studio</a>
    </div>

    <div class="footer" id="footer">&copy; 2026 mein haus</div>

</body>
</html>
